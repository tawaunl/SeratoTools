name: CodeQL

on:
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly, Mondays at 04:27 UTC.
    - cron: '27 4 * * 1'
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; the analyze job elevates only what it needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Swift needs a real build, so it runs on macOS with an explicit
          # build command (more reliable than autobuild for SwiftPM apps).
          - language: swift
            runner: macos-15
            build-mode: manual
          # Workflow (Actions) analysis needs no build and runs fast on Linux.
          - language: actions
            runner: ubuntu-latest
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift
        if: matrix.language == 'swift'
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
