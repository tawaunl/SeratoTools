          opacity="0.40" filter="url(#glowSoft)"/>
    <path d="M0,-100 L-8,-85 L-14,-65 L-14,100 Q-14,108 -6,108 L6,108 Q14,108 14,100 L14,-65 L8,-85 Z"
          opacity="0.55" filter="url(#glowTight)"/>
  </g>

  <!-- pencil shadow (depth) -->
