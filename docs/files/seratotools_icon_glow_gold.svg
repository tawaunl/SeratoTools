<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A3A3D"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glowTight" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="6" y="6" width="500" height="500" rx="112" fill="url(#bgGrad)"/>
  <ellipse cx="256" cy="130" rx="170" ry="55" fill="#FFFFFF" opacity="0.10"/>
  <ellipse cx="256" cy="430" rx="200" ry="70" fill="#000000" opacity="0.10"/>

  <!-- vinyl record -->
  <circle cx="256" cy="256" r="160" fill="#EDEDED"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="#C4C4C4" stroke-width="2"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#C4C4C4" stroke-width="2"/>
  <circle cx="256" cy="256" r="95" fill="none" stroke="#C4C4C4" stroke-width="2"/>
  <circle cx="256" cy="256" r="70" fill="none" stroke="#C4C4C4" stroke-width="2"/>
  <path d="M300,256 A44,44 0 1,0 212,256 A44,44 0 1,0 300,256 M264,256 A8,8 0 1,0 248,256 A8,8 0 1,0 264,256"
